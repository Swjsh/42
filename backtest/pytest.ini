[pytest]
# Markers for the backtest test suite.
#
# slow: data-heavy guards that load the master SPY/VIX CSV and run one or more
#       full end-to-end backtests. The whole graduated-guards file can exceed the
#       600s per-edit hook budget, so the PostToolUse hook runs only the FAST logic
#       guards with `-m "not slow"`. The slow guards still run nightly / on demand:
#
#         fast (per-edit):   cd backtest && python -m pytest tests/test_graduated_guards.py -m "not slow" -q
#         slow (nightly):    cd backtest && python -m pytest tests/test_graduated_guards.py -m slow -q
#         everything:        cd backtest && python -m pytest tests/test_graduated_guards.py -q
markers =
    slow: data-heavy guard that runs full backtests (excluded from the per-edit hook)
