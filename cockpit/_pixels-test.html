<!DOCTYPE html>
<!--
  cockpit/_pixels-test.html — standalone harness for pixels.js.
  Open this file directly in a browser (file:// works — sprites load via the
  relative ./assets/pixel/... paths). It mounts the GammaPixels office with a
  MOCK roster that mutates over time (spawn-in / despawn-out) and turns the
  A* debug-path overlay ON so you can SEE each worker follow a multi-cell route
  around the desks/coffee/whiteboard — not a straight line.

  NOT shipped to users. Dev verification only. Do not commit.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GammaPixels — office test harness</title>
<style>
  :root { --bg:#0A0C0F; --accent:#93A8DD; --text:#E7EAF2; --muted:#6C7384; --pos:#43C98E; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:Inter,-apple-system,'Segoe UI',sans-serif; overflow:hidden; }
  /* the office canvas — full-viewport background, exactly as it'll be wired in face.html */
  #gx-office { position:fixed; inset:0; width:100vw; height:100vh; z-index:0; pointer-events:none; }
  /* a fake "dashboard card" column so you can confirm workers roam the visible MARGINS */
  .frame { position:relative; z-index:1; width:100%; max-width:440px; margin:0 auto;
    min-height:100vh; padding:14px 18px; pointer-events:none; }
  .card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
    border-radius:14px; padding:16px; margin-top:10px; backdrop-filter:blur(8px); }
  .card h1 { font-size:15px; margin:0 0 4px; letter-spacing:.5px; }
  .card p { font-size:12.5px; color:var(--muted); margin:0; line-height:1.5; }
  /* dev control panel — pointer-events re-enabled here only */
  .panel { position:fixed; left:10px; bottom:10px; z-index:3; pointer-events:auto;
    background:rgba(8,10,14,.9); border:1px solid rgba(147,168,221,.25); border-radius:12px;
    padding:10px 12px; font-size:12px; width:min(380px,46vw); }
  .panel b { color:var(--accent); }
  .panel .row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .panel button { font:inherit; font-size:11.5px; color:var(--text); cursor:pointer;
    background:rgba(147,168,221,.14); border:1px solid rgba(147,168,221,.3);
    border-radius:7px; padding:5px 9px; }
  .panel button:hover { background:rgba(147,168,221,.26); }
  .panel pre { margin:8px 0 0; max-height:34vh; overflow:auto; font-size:10.5px; line-height:1.45;
    color:#A4ABBE; font-family:'JetBrains Mono',ui-monospace,monospace;
    background:rgba(0,0,0,.3); padding:7px; border-radius:7px; white-space:pre-wrap; }
  .ok { color:var(--pos); } .bad { color:#E0574E; }
</style>
</head>
<body>
  <canvas id="gx-office"></canvas>

  <div class="frame">
    <div class="card"><h1>Gamma cockpit (mock)</h1>
      <p>This center column simulates the real dashboard cards. The pixel office runs
         BEHIND it — confirm the little workers roam the side margins and clearly walk
         <i>around</i> the desks, not in straight lines.</p></div>
    <div class="card"><h1>Live agents</h1><p id="rosterTxt">—</p></div>
  </div>

  <div class="panel">
    <div><b>GammaPixels test harness</b> — debug paths <b id="dbgState">ON</b></div>
    <div class="row">
      <button id="bAdd">+ add agent</button>
      <button id="bRemove">– remove one</button>
      <button id="bDone">mark one done</button>
      <button id="bDbg">toggle debug paths</button>
      <button id="bProve">prove pathing</button>
      <button id="bChaos">cycle roster</button>
    </div>
    <pre id="out">booting…</pre>
  </div>

  <script src="./pixels.js"></script>
  <script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var canvas = $('gx-office');

    // ── mock roster (sector model) ───────────────────────────────────────────
    var ROLES   = ['engine', 'conductor', 'kitchen', 'gym', 'research'];
    var RUNNERS = {
      engine: 'Python', conductor: 'Claude Opus', kitchen: 'Nemotron · free',
      gym: 'Python', research: 'Claude Sonnet'
    };
    var TASKS = ['wiring G6 vix feed', 'ranking candidates', 'seeding cook tasks',
                 '42 validators', 'edge-hunt sweep', 'reading the tape'];
    var ACCT_ALIASES = ['Gamma-Safe-2', 'Gamma-Risky-2', 'Safe-1', 'Bold-1', 'Paper-A', 'Paper-B'];
    var seqId = 0;
    var roster = [];

    function mk(role) {
      role = role || ROLES[Math.floor(Math.random() * ROLES.length)];
      return {
        id: role + '-' + (++seqId),
        role: role,
        runner: RUNNERS[role] || 'Claude',
        task: TASKS[Math.floor(Math.random() * TASKS.length)],
        status: Math.random() < 0.3 ? 'thinking' : 'working'
      };
    }
    // the 6 always-on equity-account residents (one per Accounts cubicle)
    function accountResidents() {
      return ACCT_ALIASES.map(function (alias, i) {
        return { id: 'acct-' + i, role: 'account', runner: alias, account: alias, status: 'working' };
      });
    }
    function push() { roster = roster.concat([mk()]); apply(); }
    function pop() { if (roster.length) { roster = roster.slice(0, -1); apply(); } }
    function markDone() {
      // only role-workers finish + leave; account residents are always-on
      var workerIdx = roster.map(function (r, i) { return r.role !== 'account' ? i : -1; }).filter(function (i) { return i >= 0; });
      if (!workerIdx.length) return;
      var i = workerIdx[Math.floor(Math.random() * workerIdx.length)];
      roster = roster.map(function (r, j) { return j === i ? Object.assign({}, r, { status: 'done' }) : r; });
      apply();
    }
    function apply() {
      GammaPixels.setAgents(roster);
      $('rosterTxt').textContent = roster.length
        ? roster.map(function (r) { return r.role + ' (' + r.runner + ')' + (r.status === 'done' ? ' ✓' : ''); }).join(' · ')
        : '(office empty)';
      render();
    }

    // ── self-evidence: dump sector layout + live workers (sector + spot) ───────
    function render() {
      var snap = (window.__gxSnapshot && window.__gxSnapshot()) || [];
      var grid = (window.__gxGrid && window.__gxGrid()) || {};
      var sec = (window.__gxSectors && window.__gxSectors()) || {};
      var lines = [];
      lines.push('grid: ' + (grid.cols || '?') + 'x' + (grid.rows || '?') + ' tiles');
      Object.keys(sec).filter(function (k) { return k[0] !== '_'; }).forEach(function (k) {
        lines.push('  [' + k.toUpperCase() + '] (' + sec[k].x + ',' + sec[k].y + ')..(' + sec[k].x2 + ',' + sec[k].y2 +
          ') furn=' + sec[k].furnitureCount + ' [' + sec[k].furnitureKinds.join(',') + ']');
      });
      lines.push('— workers —');
      snap.forEach(function (s) {
        var pathStr = (window.__lastPaths && window.__lastPaths[s.id]) || [];
        lines.push(
          (s.role + '/' + s.sector).padEnd(18) + ' ' + s.state.padEnd(9) +
          ' tile(' + s.c + ',' + s.r + ') path=' + (pathStr.length || s.pathLen) +
          (s.spot ? ' spot=' + s.spot.join(',') : '') + (s.account ? ' ' + s.account : '')
        );
      });
      $('out').textContent = lines.join('\n') || '(no workers)';
    }

    // PROVE pathing + CONTAINMENT: every worker's tile is inside its home sector
    // rectangle, AND at least some follow a multi-cell A* route. Prints PASS/FAIL.
    function provePathing() {
      var sec = (window.__gxSectors && window.__gxSectors()) || {};
      var snap = (window.__gxSnapshot && window.__gxSnapshot()) || [];
      var paths = window.__lastPaths || {};
      var multi = 0, breaches = [], details = [];
      snap.forEach(function (s) {
        var sd = sec[s.sector];
        if (sd && (s.c < sd.x || s.c > sd.x2 || s.r < sd.y || s.r > sd.y2) && s.state !== 'leaving')
          breaches.push(s.id + '@(' + s.c + ',' + s.r + ') outside ' + s.sector);
        var p = paths[s.id];
        if (p && p.length >= 4) {
          var connected = true;
          for (var i = 1; i < p.length; i++) { var d = Math.abs(p[i][0] - p[i-1][0]) + Math.abs(p[i][1] - p[i-1][1]); if (d !== 1) connected = false; }
          if (connected) { multi++; details.push(s.id + ': ' + p.length + ' cells in ' + s.sector); }
        }
      });
      var v1 = breaches.length === 0 ? '<PASS> containment: all workers inside their sector.' : '<FAIL> containment breach: ' + breaches.join(' | ');
      var v2 = multi > 0 ? '<PASS> ' + multi + ' worker(s) follow a multi-cell confined A* route.' : '<info> no long routes captured this instant (try again).';
      $('out').textContent = v1 + '\n' + v2 + '\n\n' + details.join('\n');
    }

    // ── wire controls ──
    $('bAdd').onclick = push;
    $('bRemove').onclick = pop;
    $('bDone').onclick = markDone;
    $('bProve').onclick = provePathing;
    $('bDbg').onclick = function () {
      var el = $('dbgState'); var on = el.textContent === 'ON';
      GammaPixels.setDebugPaths(!on); el.textContent = on ? 'OFF' : 'ON';
    };
    $('bChaos').onclick = function () {
      // churn the roster: drop a couple, add a couple, flip a status — proves
      // spawn-in + despawn-out + no ghost-leak as the live list mutates.
      if (roster.length > 2) roster = roster.slice(1);
      roster = roster.concat([mk(), mk()]);
      if (roster.length) roster[0] = Object.assign({}, roster[0], { status: 'thinking' });
      apply();
    };

    // ── boot: mount with debug paths ON, seed the coordinator's spec roster:
    //    kitchen + conductor + research + engine + gym + the 6 account residents. ──
    GammaPixels.mount(canvas, { debugPaths: true });
    setTimeout(function () {
      ['kitchen', 'conductor', 'research', 'engine', 'gym'].forEach(function (role) { roster.push(mk(role)); });
      roster = roster.concat(accountResidents()); // 6 always-on cubicle residents
      apply();
    }, 250);

    // gentle auto-churn every ~6s — only the ROLE workers churn; the 6 account
    // residents persist (proving stable cubicle occupancy + sustained pathing).
    setInterval(function () {
      var workers = roster.filter(function (r) { return r.role !== 'account'; });
      var roll = Math.random();
      if (roll < 0.35 && workers.length < 7) roster = roster.concat([mk()]);
      else if (roll < 0.6 && workers.length > 2) {
        var idx = roster.map(function (r, i) { return r.role !== 'account' ? i : -1; }).filter(function (i) { return i >= 0; }).pop();
        if (idx != null) roster = roster.filter(function (_, i) { return i !== idx; });
      } else if (roll < 0.75) markDone();
      else { render(); return; }
      apply();
    }, 6000);

    // keep the snapshot panel fresh
    setInterval(render, 1000);
  })();
  </script>
</body>
</html>
