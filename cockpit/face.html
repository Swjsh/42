<!DOCTYPE html>
<!--
  Gamma — companion face (design D)
  Self-contained, zero-build. Served by cockpit/server.js at GET /face.
  Reads live data from GET /api/tiles, GET /api/feed, GET /events (SSE).
  UI / observability ONLY. The Approve button is display-only (data-display-only):
  the approval bus is NOT wired — clicking it places no orders and calls no trade code.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gamma</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0A0C0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/assets/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* ── palette lifted from design D ── */
    --bg:#0A0C0F;
    --bg-deep:#080A0E;
    --glass:rgba(255,255,255,.035);
    --glass-2:rgba(255,255,255,.05);
    --hairline:rgba(255,255,255,.07);
    --hairline-2:rgba(255,255,255,.10);
    --slate-1:#323747;
    --slate-2:#3C424F;
    --slate-3:#4E535A;
    --accent:#93A8DD;          /* slate-periwinkle */
    --glow:#CDDFFB;            /* bright core glow */
    --glow-2:#B4CAF3;
    --text:#E7EAF2;           /* primary */
    --text-2:#A4ABBE;         /* secondary */
    --muted:#6C7384;          /* muted */
    --pos:#43C98E;
    --caution:#E0A23C;
    --alert:#E0574E;

    --serif:'Newsreader',Georgia,serif;
    --ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  html,body{background:var(--bg);}
  body{
    font-family:var(--ui);
    color:var(--text);
    min-height:100vh;
    /* ambient depth: a faint blue lift behind the core, fading to deep near-black */
    background:
      radial-gradient(120% 80% at 50% 20%, rgba(147,168,221,.06) 0%, rgba(10,12,15,0) 55%),
      radial-gradient(140% 100% at 50% 120%, #0B0E13 0%, var(--bg-deep) 70%),
      var(--bg);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    display:flex;
    justify-content:center;
  }

  .frame{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    min-height:100vh;
    padding:max(env(safe-area-inset-top),10px) 18px max(env(safe-area-inset-bottom),14px);
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  /* ── HERO ─────────────────────────────────────────── */
  .wordmark{
    text-align:center;
    font-family:var(--serif);
    font-weight:400;
    font-size:13px;
    letter-spacing:.62em;
    text-indent:.62em; /* compensate trailing tracking so it reads centered */
    color:var(--text-2);
    padding-top:2px;
    opacity:.92;
  }

  .hero{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:2px;
  }
  .core-wrap{
    position:relative;
    width:min(34vw,98px);
    height:min(34vw,98px);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  /* soft pulsing radial glow behind the core */
  .core-wrap::before{
    content:"";
    position:absolute;
    inset:-12%;
    border-radius:50%;
    background:radial-gradient(circle at 50% 47%, rgba(205,223,251,.30) 0%, rgba(147,168,221,.16) 28%, rgba(147,168,221,0) 62%);
    filter:blur(8px);
    animation:halo 6s ease-in-out infinite;
    pointer-events:none;
  }
  .core{
    position:relative;
    width:100%;
    height:100%;
    object-fit:contain;
    animation:breathe 6s ease-in-out infinite;
    will-change:transform,opacity;
    user-select:none;
    -webkit-user-drag:none;
  }
  @keyframes breathe{
    0%,100%{transform:scale(1.0);opacity:.85;}
    50%{transform:scale(1.04);opacity:1;}
  }
  @keyframes halo{
    0%,100%{opacity:.55;transform:scale(1.0);}
    50%{opacity:.95;transform:scale(1.08);}
  }

  .verdict{
    font-family:var(--serif);
    font-weight:400;
    font-size:21px;
    line-height:1.15;
    text-align:center;
    color:var(--text);
    margin-top:0;
    letter-spacing:.005em;
  }
  .verdict.is-watch{color:#EBD7A8;}
  .verdict.is-alert{color:#F2B0AA;}
  .subline{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:.01em;
  }
  .subline .dot{opacity:.5;padding:0 5px;}

  /* ── presence pulse ── ambient "the loop is alive" cue under the sub-line ── */
  .presence{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    margin-top:8px;
    font-size:11.5px;
    color:var(--text-2);
    letter-spacing:.015em;
    opacity:.78;
    transition:opacity .4s ease;
  }
  .presence.is-hidden{display:none;}
  .presence #presenceText{font-family:var(--ui);}
  .presence .presence-time{font-family:var(--mono);color:var(--text);}
  .presence-dot{
    width:6px;height:6px;border-radius:50%;
    flex:0 0 6px;
    background:var(--accent);
    box-shadow:0 0 7px rgba(147,168,221,.7);
    animation:presencePulse 2.6s ease-in-out infinite;
  }
  .presence.is-asleep{opacity:.5;}
  .presence.is-asleep .presence-dot{
    background:var(--muted);box-shadow:none;animation:none;
  }
  @keyframes presencePulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.4;transform:scale(.82);}
  }

  /* ── MIC (voice) — small glowing control under the core ── */
  .mic-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    margin-top:4px;
  }
  .mic-btn{
    position:relative;
    width:36px;height:36px;
    border-radius:50%;
    border:1px solid var(--hairline-2);
    background:
      radial-gradient(circle at 50% 38%, rgba(147,168,221,.16) 0%, rgba(147,168,221,0) 70%),
      var(--glass-2);
    color:var(--text-2);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease, border-color .2s ease, color .2s ease, box-shadow .25s ease;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  }
  .mic-btn:hover{border-color:rgba(147,168,221,.45);color:var(--text);}
  .mic-btn:active{transform:scale(.94);}
  .mic-btn svg{width:20px;height:20px;display:block;}
  /* connecting — soft amber pulse */
  .mic-btn.is-connecting{
    color:var(--caution);border-color:rgba(224,162,60,.5);
    box-shadow:0 0 0 0 rgba(224,162,60,.4);
    animation:micPulse 1.6s ease-in-out infinite;
  }
  /* listening — live accent ring */
  .mic-btn.is-listening{
    color:var(--glow);border-color:rgba(147,168,221,.7);
    box-shadow:0 0 14px rgba(147,168,221,.45), 0 0 0 1px rgba(147,168,221,.3);
    animation:micPulse 2.2s ease-in-out infinite;
  }
  /* user talking — brighter, faster */
  .mic-btn.is-user{
    color:var(--glow);border-color:rgba(205,223,251,.85);
    box-shadow:0 0 18px rgba(205,223,251,.55);
    animation:micPulse 1.1s ease-in-out infinite;
  }
  /* Gamma speaking — green-tinted */
  .mic-btn.is-speaking{
    color:var(--pos);border-color:rgba(67,201,142,.7);
    box-shadow:0 0 16px rgba(67,201,142,.5);
    animation:micPulse 1.4s ease-in-out infinite;
  }
  .mic-btn.is-error{color:var(--alert);border-color:rgba(224,87,78,.6);}
  @keyframes micPulse{
    0%,100%{box-shadow:0 0 10px rgba(147,168,221,.30);}
    50%{box-shadow:0 0 20px rgba(147,168,221,.55);}
  }
  .mic-status{
    font-size:11px;
    color:var(--muted);
    letter-spacing:.04em;
    min-height:14px;
    text-align:center;
    transition:color .2s ease;
  }
  .mic-status.is-live{color:var(--text-2);}
  .mic-status.is-error{color:var(--alert);}

  /* the hero core reacts while the voice is active — reuse the accent glow */
  .core-wrap.voice-listening::before{
    background:radial-gradient(circle at 50% 47%, rgba(147,168,221,.42) 0%, rgba(147,168,221,.20) 30%, rgba(147,168,221,0) 64%);
    animation:halo 3.4s ease-in-out infinite;
  }
  .core-wrap.voice-speaking::before{
    background:radial-gradient(circle at 50% 47%, rgba(67,201,142,.40) 0%, rgba(67,201,142,.18) 30%, rgba(67,201,142,0) 64%);
    animation:halo 2.2s ease-in-out infinite;
  }

  /* ── glass card base ─────────────────────────────── */
  .card{
    background:var(--glass);
    border:1px solid var(--hairline);
    border-radius:16px;
    padding:9px 13px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }
  .card-label{
    font-size:10.5px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:5px;
    font-weight:600;
  }

  /* ── NEEDS YOU ───────────────────────────────────── */
  .needs{
    position:relative;
    border-color:rgba(147,168,221,.28);
    background:
      linear-gradient(180deg, rgba(147,168,221,.07) 0%, rgba(147,168,221,.02) 100%),
      var(--glass);
    box-shadow:0 0 0 1px rgba(147,168,221,.05), 0 8px 30px rgba(80,104,170,.10);
  }
  .needs .card-label{color:var(--accent);}
  .needs .ask{
    font-family:var(--serif);
    font-size:16px;
    line-height:1.35;
    color:var(--text);
    margin-bottom:10px;
  }
  .btn-row{display:flex;gap:10px;}
  .btn{
    flex:1;
    font-family:var(--ui);
    font-size:14px;
    font-weight:600;
    padding:11px 0;
    border-radius:12px;
    border:1px solid var(--hairline-2);
    cursor:pointer;
    transition:transform .12s ease, background .15s ease, border-color .15s ease;
    letter-spacing:.01em;
    padding:9px 0;
  }
  .btn:active{transform:scale(.975);}
  .btn-approve{
    background:linear-gradient(180deg,#A8BCEA 0%, var(--accent) 100%);
    border-color:transparent;
    color:#0C1320;
    box-shadow:0 6px 18px rgba(147,168,221,.22);
  }
  .btn-hold{
    background:rgba(255,255,255,.03);
    color:var(--text-2);
  }
  .btn-hold:hover{border-color:var(--hairline-2);color:var(--text);}
  .display-note{
    margin-top:11px;
    font-size:10.5px;
    color:var(--muted);
    text-align:center;
    letter-spacing:.02em;
    opacity:.85;
  }
  .is-hidden{display:none !important;}
  .needs-detail{font-size:11.5px;color:var(--muted);line-height:1.4;margin:-2px 0 10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .needs.is-clear{border-color:var(--hairline);background:var(--glass);box-shadow:none;}
  .needs.is-clear .card-label{color:var(--muted);}
  .needs.is-clear .ask{font-family:var(--ui);font-size:13.5px;color:var(--text-2);margin-bottom:0;}

  /* ── ACTIVITY feed ───────────────────────────────── */
  .feed{display:flex;flex-direction:column;}
  .feed-item{
    display:grid;
    grid-template-columns:3px 1fr;
    gap:0;
    padding:6px 0;
    border-top:1px solid rgba(255,255,255,.05);
  }
  .feed-item:first-of-type{border-top:none;}
  .feed-rule{
    width:3px;
    border-radius:3px;
    background:var(--slate-3);
    align-self:stretch;
  }
  .feed-rule.shipped{background:var(--pos);}
  .feed-rule.healthy{background:var(--accent);}
  .feed-rule.caution{background:var(--alert);}
  .feed-rule.info{background:var(--slate-3);}
  .feed-body{padding-left:13px;min-width:0;}
  .feed-ts{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--muted);
    letter-spacing:.01em;
    display:block;
    margin-bottom:3px;
  }
  .feed-text{
    font-family:var(--ui);
    font-size:13.5px;
    line-height:1.45;
    color:var(--text-2);
  }
  .feed-text .anchor{
    font-family:var(--serif);
    font-weight:500;
    font-size:15px;
    color:var(--text);
    margin-right:.18em;
  }
  .feed-empty{font-size:13px;color:var(--muted);padding:6px 0;text-align:center;}

  /* ── VITALS ──────────────────────────────────────── */
  .vitals-summary{
    font-family:var(--mono);
    font-size:13px;
    color:var(--text-2);
    margin-bottom:14px;
    letter-spacing:.01em;
  }
  .vitals-summary b{color:var(--text);font-weight:600;}
  .vitals-summary .seg{padding:0 7px;color:var(--muted);}
  .vitals-summary .v-pos{color:var(--pos);}
  .vitals-summary .v-watch{color:var(--caution);}
  .vitals-summary .v-alert{color:var(--alert);}

  .sys-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px 7px;
    margin-bottom:2px;
  }
  .sys{
    display:flex;
    align-items:center;
    gap:6px;
    padding:4px 9px;
    border-radius:999px;
    border:1px solid var(--hairline);
    background:rgba(255,255,255,.025);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .sys:hover{border-color:var(--hairline-2);background:rgba(255,255,255,.06);}
  .sys:active{transform:scale(.97);}
  .sys-dot{
    width:8px;height:8px;border-radius:50%;
    flex:0 0 8px;
    background:var(--slate-3);
    box-shadow:0 0 0 0 rgba(0,0,0,0);
  }
  .sys-dot.GREEN{background:var(--pos);box-shadow:0 0 7px rgba(67,201,142,.55);}
  .sys-dot.YELLOW{background:var(--caution);box-shadow:0 0 7px rgba(224,162,60,.5);}
  .sys-dot.RED{background:var(--alert);box-shadow:0 0 8px rgba(224,87,78,.6);}
  .sys-name{font-size:11.5px;color:var(--text-2);white-space:nowrap;}

  .figs{
    display:flex;
    border-top:1px solid var(--hairline);
    margin-top:11px;
    padding-top:11px;
    gap:12px;
  }
  .fig{flex:1;}
  .fig-label{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .fig-val{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.01em;}
  .fig-val.spy{color:var(--accent);}
  .fig-val.is-stale{opacity:.45;}

  /* ── system detail sheet — tap any chip → who's doing what ── */
  .sys-hint{font-size:10px;color:var(--muted);letter-spacing:.04em;margin-left:auto;}
  .sheet-backdrop{position:fixed;inset:0;background:rgba(6,8,11,.62);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .sheet-backdrop.open{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:51;
    width:100%;max-width:440px;margin:0 auto;
    background:#0E1117;border:1px solid var(--hairline-2);border-bottom:none;
    border-radius:18px 18px 0 0;
    padding:14px 16px max(env(safe-area-inset-bottom),16px);
    max-height:82vh;overflow-y:auto;
    transform:translateY(101%);transition:transform .26s cubic-bezier(.22,1,.36,1);
  }
  .sheet.open{transform:translateY(0);}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .sheet-title{font-family:var(--serif);font-size:18px;color:var(--text);}
  .sheet-sub{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .sheet-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--hairline-2);background:var(--glass-2);color:var(--text-2);font-size:13px;cursor:pointer;line-height:1;}
  .sheet-close:hover{color:var(--text);}
  .sys-row{display:grid;grid-template-columns:11px 1fr;gap:11px;padding:11px 0;border-top:1px solid rgba(255,255,255,.06);}
  .sys-row:first-of-type{border-top:none;}
  .sys-row .rdot{width:9px;height:9px;border-radius:50%;margin-top:6px;}
  .sys-row .rdot.GREEN{background:var(--pos);box-shadow:0 0 7px rgba(67,201,142,.5);}
  .sys-row .rdot.YELLOW{background:var(--caution);box-shadow:0 0 7px rgba(224,162,60,.5);}
  .sys-row .rdot.RED{background:var(--alert);box-shadow:0 0 8px rgba(224,87,78,.6);}
  .sys-row .rhead{display:flex;align-items:baseline;gap:9px;}
  .sys-row .rname{font-size:15px;color:var(--text);font-weight:500;}
  .sys-row .rstatus{font-size:10px;letter-spacing:.08em;text-transform:uppercase;}
  .sys-row .rstatus.GREEN{color:var(--pos);}
  .sys-row .rstatus.YELLOW{color:var(--caution);}
  .sys-row .rstatus.RED{color:var(--alert);}
  .sys-row .rdetail{font-family:var(--mono);font-size:11.5px;color:var(--text-2);line-height:1.5;margin-top:4px;word-break:break-word;}

  /* ── drill-in: per-system detail rendered in the EXACT Activity-feed style ── */
  .sheet-back{
    display:none;align-items:center;gap:5px;
    font-size:12px;color:var(--text-2);
    background:none;border:none;cursor:pointer;padding:2px 0;margin-bottom:2px;
    letter-spacing:.01em;
  }
  .sheet-back.show{display:inline-flex;}
  .sheet-back:hover{color:var(--text);}
  .drill-section{margin-top:12px;}
  .drill-section:first-child{margin-top:4px;}
  .drill-label{
    font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:5px;
    display:flex;align-items:center;gap:7px;
  }
  .drill-label::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.06);}
  /* a drill card == a feed-item: colored left-rule + mono ts + serif anchor + line + by-tag */
  .drill-item{
    display:grid;grid-template-columns:3px 1fr;gap:0;
    padding:7px 0;border-top:1px solid rgba(255,255,255,.05);
  }
  .drill-item:first-of-type{border-top:none;}
  .drill-rule{width:3px;border-radius:3px;background:var(--slate-3);align-self:stretch;}
  .drill-rule.GREEN{background:var(--pos);}
  .drill-rule.YELLOW{background:var(--caution);}
  .drill-rule.RED{background:var(--alert);}
  .drill-body{padding-left:13px;min-width:0;}
  .drill-ts{
    font-family:var(--mono);font-size:10.5px;color:var(--muted);
    letter-spacing:.01em;display:block;margin-bottom:3px;
  }
  .drill-cat{
    font-family:var(--serif);font-weight:500;font-size:14.5px;color:var(--text);
    display:block;margin-bottom:1px;word-break:break-word;
  }
  .drill-text{
    font-family:var(--ui);font-size:13px;line-height:1.45;color:var(--text-2);
    word-break:break-word;
  }
  .drill-by{
    display:block;margin-top:4px;
    font-family:var(--ui);font-size:10px;color:var(--muted);
    letter-spacing:.02em;opacity:.85;
  }
  .drill-by::before{content:"by ";opacity:.6;}
  .drill-empty{font-size:12.5px;color:var(--muted);padding:6px 0;}
  /* account rows are tappable drill cards — add an affordance chevron */
  .drill-item.tappable{cursor:pointer;}
  .drill-item.tappable:hover .drill-cat{color:var(--glow);}
  .drill-item.tappable .drill-cat::after{content:" ›";color:var(--muted);font-family:var(--ui);}

  /* ── footer ──────────────────────────────────────── */
  .footer{
    display:none;
    text-align:center;
    font-size:10px;
    color:var(--muted);
    letter-spacing:.06em;
    opacity:.55;
    margin-top:2px;
  }
  .footer .live{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--pos);margin-right:6px;vertical-align:middle;
    box-shadow:0 0 6px rgba(67,201,142,.6);
    animation:livepulse 2.4s ease-in-out infinite;
  }
  .footer.stale .live{background:var(--muted);box-shadow:none;animation:none;}
  @keyframes livepulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  @media (prefers-reduced-motion:reduce){
    .core,.core-wrap::before,.footer .live,.presence-dot,.mic-btn{animation:none;}
  }
</style>
</head>
<body>
  <!-- pixel office: living agents behind the dashboard (fixed full-viewport canvas) -->
  <canvas id="gx-office" aria-hidden="true" style="position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;"></canvas>
  <main class="frame">

    <!-- HERO -->
    <div class="wordmark">GAMMA</div>
    <section class="hero">
      <div class="core-wrap">
        <img class="core" src="/assets/gamma-core.png" alt="Gamma core" width="300" height="300" draggable="false">
      </div>
      <h1 class="verdict" id="verdict">All systems healthy</h1>
      <p class="subline" id="subline">Watching<span class="dot">·</span>market closed<span class="dot">·</span>both accounts flat</p>
      <!-- presence pulse: ambient proof the autonomous loop is alive (GET /api/pulse) -->
      <p class="presence is-hidden" id="presence">
        <span class="presence-dot"></span><span id="presenceText"></span>
      </p>
      <!-- voice mic: tap to talk to Gamma (OpenAI Realtime). Read/answer only —
           grounded in live state via the get_gamma_state tool. -->
      <div class="mic-wrap">
        <button class="mic-btn" id="micBtn" type="button" aria-label="Talk to Gamma" title="Tap to talk to Gamma">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="2.5" width="6" height="11" rx="3"></rect>
            <path d="M5.5 11a6.5 6.5 0 0 0 13 0"></path>
            <line x1="12" y1="17.5" x2="12" y2="21"></line>
            <line x1="8.5" y1="21" x2="15.5" y2="21"></line>
          </svg>
        </button>
        <span class="mic-status" id="micStatus">Tap to talk</span>
      </div>
    </section>

    <!-- NEEDS YOU — the real pending approval from /api/needs. Approve/Hold POST to
         /api/decide → companion-decisions.jsonl, which the GATED actuator bridges (G8). -->
    <section class="card needs is-hidden" id="needsCard">
      <div class="card-label" id="needsLabel">Needs you</div>
      <div class="ask" id="needsAsk"></div>
      <div class="needs-detail is-hidden" id="needsDetail"></div>
      <div class="btn-row" id="needsBtns">
        <button class="btn btn-approve" id="approveBtn" type="button">Approve</button>
        <button class="btn btn-hold" id="holdBtn" type="button">Hold</button>
      </div>
      <div class="display-note is-hidden" id="approveNote"></div>
    </section>

    <!-- ACTIVITY -->
    <section class="card">
      <div class="card-label">Activity</div>
      <div class="feed" id="feed">
        <div class="feed-empty">Listening for Gamma…</div>
      </div>
    </section>

    <!-- VITALS -->
    <section class="card">
      <div class="card-label" style="display:flex;align-items:center">Vitals<span class="sys-hint">tap a system ›</span></div>
      <div class="vitals-summary" id="vitalsSummary">— healthy · — watch · — alert</div>
      <div class="sys-grid" id="sysGrid"></div>
      <!-- live vitals: SPY + account equities from GET /api/vitals (read-only cached state) -->
      <div class="figs">
        <div class="fig">
          <div class="fig-label">Gamma-Safe</div>
          <div class="fig-val" id="figSafe">$2,000</div>
        </div>
        <div class="fig">
          <div class="fig-label">Gamma-Bold</div>
          <div class="fig-val" id="figBold">$1,649</div>
        </div>
        <div class="fig">
          <div class="fig-label">SPY</div>
          <div class="fig-val spy" id="figSpy">735.59</div>
        </div>
      </div>
    </section>

    <div class="footer" id="footer"><span class="live"></span><span id="footerText">live</span></div>
  </main>

  <!-- system detail sheet — what each part of Gamma is doing (tap any chip) -->
  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <aside class="sheet" id="sysSheet" role="dialog" aria-label="System detail" aria-hidden="true">
    <button class="sheet-back" id="sheetBack" type="button">‹ Back</button>
    <div class="sheet-head"><div class="sheet-title" id="sheetTitle">Systems</div><button class="sheet-close" id="sheetClose" type="button" aria-label="Close">✕</button></div>
    <div class="sheet-sub" id="sheetSub">What each part of Gamma is doing right now</div>
    <div id="sheetBody"></div>
  </aside>

<!-- OpenAI Realtime voice client (WebRTC). Loads BEFORE the inline app script so
     window.GammaRealtime exists when the mic is wired. The raw OpenAI key never
     ships here — only an ephemeral token minted by /api/realtime-token. -->
<script src="/realtime.js"></script>
<script>
(function(){
  "use strict";

  // ── helpers ───────────────────────────────────────────────
  function el(id){return document.getElementById(id);}
  function esc(s){
    return String(s == null ? "" : s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  // Compress the verbose tile title into a short subsystem label.
  function shortName(title){
    var t = String(title || "");
    if (/Beacon/i.test(t)) return "Beacon";
    if (/Accounts/i.test(t)) return "Accounts";
    if (/Autonomy/i.test(t)) return "Autonomy";
    if (/Discord/i.test(t)) return "Discord";
    if (/Task Health/i.test(t)) return "Tasks";
    // strip parenthetical and slash extras: "Accounts / P&L" -> "Accounts"
    return t.replace(/\s*\/.*$/, "").replace(/\s*\(.*$/, "").trim();
  }

  // ── VITALS / HERO from /api/tiles ─────────────────────────
  var lastTiles = [];
  function renderTiles(tiles){
    if (!Array.isArray(tiles) || !tiles.length) return;
    lastTiles = tiles;

    var healthy=0, watch=0, alert=0;
    tiles.forEach(function(t){
      if (t.light === "GREEN") healthy++;
      else if (t.light === "YELLOW") watch++;
      else alert++; // RED or anything unknown
    });

    // hero verdict derived from worst light
    var v = el("verdict");
    var sub = el("subline");
    v.classList.remove("is-watch","is-alert");
    if (alert > 0){
      v.textContent = alert === 1 ? "One system needs me" : (alert + " systems need me");
      v.classList.add("is-alert");
    } else if (watch > 0){
      v.textContent = "Holding steady";
      v.classList.add("is-watch");
    } else {
      v.textContent = "All systems healthy";
    }

    // sub-line: market state + account flatness pulled from the Accounts tile if present
    var acct = tiles.find(function(t){return /Accounts/i.test(t.title);});
    var eng  = tiles.find(function(t){return /Engine/i.test(t.title);});
    var marketOpen = eng && /market_open=true/i.test(eng.text || "");
    var bothFlat = acct && /Safe:\s*flat/i.test(acct.text||"") && /Bold:\s*flat/i.test(acct.text||"");
    var parts = ["Watching",
                 marketOpen ? "market open" : "market closed",
                 bothFlat ? "both accounts flat" : (acct ? "positions live" : "accounts unknown")];
    sub.innerHTML = parts.map(esc).join('<span class="dot">·</span>');

    // summary line
    el("vitalsSummary").innerHTML =
      '<b class="v-pos">'+healthy+'</b> healthy<span class="seg">·</span>' +
      '<b class="v-watch">'+watch+'</b> watch<span class="seg">·</span>' +
      '<b class="v-alert">'+alert+'</b> alert';

    // refined system row/grid (dot + label, not a cryptic grid)
    var grid = el("sysGrid");
    grid.innerHTML = tiles.map(function(t){
      var light = (t.light === "GREEN" || t.light === "YELLOW" || t.light === "RED") ? t.light : "RED";
      return '<div class="sys" title="'+esc(t.text||"")+'">' +
               '<span class="sys-dot '+light+'"></span>' +
               '<span class="sys-name">'+esc(shortName(t.title))+'</span>' +
             '</div>';
    }).join("");
  }

  // ── ACTIVITY from /api/feed ───────────────────────────────
  // anchor word = first meaningful token of the message, set in serif.
  function splitAnchor(text){
    var s = String(text || "").trim();
    if (!s) return {anchor:"", rest:""};
    var m = s.match(/^([\wâ€™'’\-:]+)(\s+)([\s\S]*)$/);
    if (!m) return {anchor:s, rest:""};
    return {anchor:m[1], rest:m[3]};
  }

  function renderFeed(messages){
    var feed = el("feed");
    if (!Array.isArray(messages) || !messages.length){
      feed.innerHTML = '<div class="feed-empty">Quiet for now — nothing new from Gamma.</div>';
      return;
    }
    // newest first (server emits newest-first already; guard anyway by leaving order)
    feed.innerHTML = messages.slice(0, 2).map(function(m){
      var kind = ["shipped","caution","healthy","info"].indexOf(m.kind) >= 0 ? m.kind : "info";
      var a = splitAnchor(m.text);
      var ts = esc(m.ts_et || "");
      return '<div class="feed-item">' +
               '<span class="feed-rule '+kind+'"></span>' +
               '<div class="feed-body">' +
                 '<span class="feed-ts">'+ts+'</span>' +
                 '<span class="feed-text">' +
                   (a.anchor ? '<span class="anchor">'+esc(a.anchor)+'</span> ' : '') +
                   esc(a.rest) +
                 '</span>' +
               '</div>' +
             '</div>';
    }).join("");
  }

  // ── VITALS figures from /api/vitals ───────────────────────
  function fmtMoney(n){
    if (typeof n !== "number" || !isFinite(n)) return "—";
    return "$" + Math.round(n).toLocaleString("en-US");
  }
  function fmtPrice(n){
    if (typeof n !== "number" || !isFinite(n)) return "—";
    return n.toFixed(2);
  }
  function setFig(node, value, stale){
    if (!node) return;
    node.textContent = value;
    node.classList.toggle("is-stale", !!stale);
  }
  function renderVitals(v){
    if (!v || typeof v !== "object") return;
    var spy = v.spy || {};
    setFig(el("figSpy"), fmtPrice(spy.last), false);
    var accts = Array.isArray(v.accounts) ? v.accounts : [];
    var safe = accts.find(function(a){return /safe/i.test(a && a.name);});
    var bold = accts.find(function(a){return /bold/i.test(a && a.name);});
    if (safe) setFig(el("figSafe"), fmtMoney(safe.equity), safe.stale);
    if (bold) setFig(el("figBold"), fmtMoney(bold.equity), bold.stale);
  }

  // ── PRESENCE pulse from /api/pulse ────────────────────────
  // Ambient "the loop is alive" cue: a pulsing accent dot + a calm line like
  // "Awake · last acted 11:55 ET · 6 moves today". Quiet by design.
  function renderPulse(p){
    var node = el("presence");
    var txt  = el("presenceText");
    if (!node || !txt) return;
    if (!p || typeof p !== "object" || !p.awake){
      // Asleep / unknown — keep it subtle (dim dot, no pulse) rather than hiding,
      // but if we have nothing at all, stay hidden so we never show a bare dot.
      if (!p || !p.lastActedEt){
        node.classList.add("is-hidden");
        return;
      }
      node.classList.remove("is-hidden");
      node.classList.add("is-asleep");
      txt.innerHTML = 'Idle<span class="dot" style="opacity:.4;padding:0 5px;">·</span>' +
                      'last acted <span class="presence-time">'+esc(p.lastActedEt)+'</span>';
      return;
    }
    node.classList.remove("is-hidden","is-asleep");
    var when = p.lastActedEt ? esc(p.lastActedEt) : "just now";
    var html = 'Awake<span class="dot" style="opacity:.4;padding:0 5px;">·</span>' +
               'last acted <span class="presence-time">'+when+'</span>';
    if (typeof p.actionsToday === "number" && p.actionsToday > 0){
      html += '<span class="dot" style="opacity:.4;padding:0 5px;">·</span>' +
              esc(p.actionsToday) + (p.actionsToday === 1 ? " move today" : " moves today");
    }
    txt.innerHTML = html;
    // Title carries the longer label for a hover ("I fixed …") — kept out of the
    // visible line to stay quiet.
    node.title = p.lastLabel ? String(p.lastLabel) : "";
  }

  // ── fetchers ──────────────────────────────────────────────
  function loadTiles(){
    fetch("/api/tiles").then(function(r){return r.json();})
      .then(renderTiles)
      .then(markLive)
      .catch(function(){ /* fail-open: keep last render */ });
  }
  function loadFeed(){
    fetch("/api/feed").then(function(r){return r.json();})
      .then(function(d){ renderFeed(d && d.messages); })
      .catch(function(){ /* fail-open */ });
  }
  function loadVitals(){
    fetch("/api/vitals").then(function(r){return r.json();})
      .then(renderVitals)
      .catch(function(){ /* fail-open: keep last figures */ });
  }
  function loadPulse(){
    fetch("/api/pulse").then(function(r){return r.json();})
      .then(renderPulse)
      .catch(function(){ /* fail-open: keep last presence */ });
  }

  var footerEl = el("footer");
  function markLive(){
    footerEl.classList.remove("stale");
    el("footerText").textContent = "live";
  }
  function markStale(){
    footerEl.classList.add("stale");
    el("footerText").textContent = "reconnecting…";
  }

  // ── SSE: refetch tiles+feed on any message; reconnect on drop ─
  var es = null;
  function connectSSE(){
    try { if (es) es.close(); } catch(_){}
    es = new EventSource("/events");
    var debounce = null;
    es.onmessage = function(){
      // coalesce bursts of state-change events into one refetch
      if (debounce) return;
      debounce = setTimeout(function(){
        debounce = null;
        loadTiles();
        loadFeed();
        loadVitals();
        loadPulse();
        loadNeeds();
      }, 250);
    };
    es.onopen = markLive;
    es.onerror = function(){
      markStale();
      // EventSource auto-reconnects, but if it hard-closes, rebuild after a beat
      if (es && es.readyState === 2){
        setTimeout(connectSSE, 3000);
      }
    };
  }

  // ── NEEDS YOU — real pending approval; Approve/Hold record consent to the bus ──
  // POST /api/decide → companion-decisions.jsonl, which the GATED autonomy actuator
  // bridges into the proposal ledger (G8). The app records consent only — it never
  // edits params or places orders.
  var resolvedNeeds = {};
  function renderNeeds(n){
    var card=el("needsCard"), ask=el("needsAsk"), detail=el("needsDetail"),
        btns=el("needsBtns"), note=el("approveNote"), label=el("needsLabel");
    var p = n && n.pending;
    if (p && p.id && !resolvedNeeds[p.id]){
      card.dataset.id = p.id;
      card.classList.remove("is-hidden","is-clear");
      label.textContent = "Needs you";
      ask.textContent = p.title || "Approval needed";
      if (p.detail){ detail.textContent = p.detail; detail.classList.remove("is-hidden"); }
      else detail.classList.add("is-hidden");
      btns.classList.remove("is-hidden");
      note.classList.add("is-hidden"); note.textContent = "";
      el("approveBtn").disabled=false; el("approveBtn").textContent="Approve";
      el("holdBtn").disabled=false;
    } else {
      card.classList.remove("is-hidden"); card.classList.add("is-clear");
      label.textContent = "All clear";
      ask.textContent = "Nothing needs you right now.";
      detail.classList.add("is-hidden");
      btns.classList.add("is-hidden");
      note.classList.add("is-hidden");
    }
  }
  function loadNeeds(){
    fetch("/api/needs").then(function(r){return r.json();})
      .then(renderNeeds).catch(function(){ /* fail-open: keep last render */ });
  }
  function decide(decision){
    var card=el("needsCard"); var id=card.dataset.id; if(!id) return;
    el("approveBtn").disabled=true; el("holdBtn").disabled=true;
    var note=el("approveNote"); note.classList.remove("is-hidden"); note.textContent="Sending…";
    fetch("/api/decide",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:id,decision:decision})})
      .then(function(r){return r.json();})
      .then(function(res){
        if(!res || res.ok===false){ throw new Error((res&&res.error)||"failed"); }
        resolvedNeeds[id]=true;
        el("needsBtns").classList.add("is-hidden");
        note.textContent = decision==="approve" ? "Approved ✓ — sent to Gamma." : "Held ✓ — shelved.";
        setTimeout(function(){ renderNeeds({pending:null}); }, 1500);
      })
      .catch(function(){
        note.textContent = "Couldn't reach Gamma — try again.";
        el("approveBtn").disabled=false; el("holdBtn").disabled=false;
      });
  }
  el("approveBtn").addEventListener("click", function(){ decide("approve"); });
  el("holdBtn").addEventListener("click", function(){ decide("reject"); });

  // ── SYSTEM DRILL-IN SHEET — tap a chip → THAT system's own detail ───────────
  // Each item renders as an Activity-feed card (colored rule + mono ts + serif
  // anchor + line + a muted "by <who>" tag). Accounts get a 2nd layer.
  function statusWord(light){ return light==="GREEN"?"healthy":light==="YELLOW"?"watch":light==="RED"?"alert":""; }

  // Map a tile title → the system key the backend understands.
  function tileKey(title){
    var t = String(title||"").toLowerCase();
    if (t.indexOf("beacon")>=0) return "beacon";
    if (t.indexOf("account")>=0) return "accounts";
    if (t.indexOf("autonomy")>=0) return "autonomy";
    if (t.indexOf("conductor")>=0) return "conductor";
    if (t.indexOf("discord")>=0) return "discord";
    if (t.indexOf("kitchen")>=0) return "kitchen";
    if (t.indexOf("spend")>=0) return "spend";
    if (t.indexOf("gym")>=0) return "gym";
    if (t.indexOf("task")>=0) return "tasks";
    if (t.indexOf("engine")>=0) return "engine";
    return "";
  }

  // Render ONE feed-style card. `tapAttr` (optional) makes it a drill row.
  function drillCard(item, ruleLight, tapAttr){
    var ts = esc(item && item.ts || "");
    var cat = esc(item && item.category || "");
    var text = esc(item && item.text || "");
    var by = item && item.by ? '<span class="drill-by">'+esc(item.by)+'</span>' : '';
    return '<div class="drill-item'+(tapAttr?' tappable':'')+'"'+(tapAttr||'')+'>' +
             '<span class="drill-rule '+ruleLight+'"></span>' +
             '<div class="drill-body">' +
               (ts?'<span class="drill-ts">'+ts+'</span>':'') +
               (cat?'<span class="drill-cat">'+cat+'</span>':'') +
               (text?'<span class="drill-text">'+text+'</span>':'') +
               by +
             '</div>' +
           '</div>';
  }

  // Render a system detail object {title,status,sections:[{label,items}]} into the
  // sheet body. `accountDrill` toggles the accounts 2nd-layer tap affordance.
  function renderSystem(sys, accountDrill){
    var light = (sys && (sys.status==="GREEN"||sys.status==="YELLOW"||sys.status==="RED")) ? sys.status : "YELLOW";
    el("sheetTitle").textContent = (sys && sys.title) || "System";
    el("sheetSub").textContent = statusWord(light) ? ("Status: "+statusWord(light)) : "";
    var sections = (sys && Array.isArray(sys.sections)) ? sys.sections : [];
    if (!sections.length){
      el("sheetBody").innerHTML = '<div class="drill-empty">No detail reported.</div>';
      return;
    }
    el("sheetBody").innerHTML = sections.map(function(sec){
      var items = Array.isArray(sec.items) ? sec.items : [];
      var rows = items.length
        ? items.map(function(it){
            var tap = (accountDrill && it.sub_id)
              ? ' data-account="'+esc(it.sub_id)+'"' : '';
            return drillCard(it, light, tap);
          }).join("")
        : '<div class="drill-empty">Nothing here right now.</div>';
      return '<div class="drill-section">' +
               '<div class="drill-label">'+esc(sec.label||"")+'</div>' +
               rows +
             '</div>';
    }).join("");
    // Wire account drill rows (accounts layer 1 → layer 2).
    if (accountDrill){
      Array.prototype.forEach.call(el("sheetBody").querySelectorAll("[data-account]"), function(node){
        node.addEventListener("click", function(){ openAccount(node.getAttribute("data-account")); });
      });
    }
  }

  var currentKey = null;       // which system the sheet is showing
  function showBack(on){ el("sheetBack").classList.toggle("show", !!on); }

  function openSystem(key){
    currentKey = key;
    showBack(false);
    el("sheetBody").innerHTML = '<div class="drill-empty">Loading…</div>';
    el("sheetTitle").textContent = "Loading…";
    el("sheetSub").textContent = "";
    fetch("/api/system?key="+encodeURIComponent(key))
      .then(function(r){return r.json();})
      .then(function(sys){ renderSystem(sys, key==="accounts"); })
      .catch(function(){ el("sheetBody").innerHTML = '<div class="drill-empty">Couldn’t load detail.</div>'; });
  }

  function openAccount(id){
    showBack(true);
    el("sheetBody").innerHTML = '<div class="drill-empty">Loading account…</div>';
    el("sheetTitle").textContent = "Loading…";
    fetch("/api/account?id="+encodeURIComponent(id))
      .then(function(r){return r.json();})
      .then(function(acct){ renderSystem(acct, false); })
      .catch(function(){ el("sheetBody").innerHTML = '<div class="drill-empty">Couldn’t load account.</div>'; });
  }

  function openSheet(key){
    openSystem(key);
    el("sheetBackdrop").classList.add("open");
    el("sysSheet").classList.add("open");
    el("sysSheet").setAttribute("aria-hidden","false");
  }
  function closeSheet(){
    el("sheetBackdrop").classList.remove("open");
    el("sysSheet").classList.remove("open");
    el("sysSheet").setAttribute("aria-hidden","true");
    showBack(false);
  }

  // Tap a specific chip → open THAT system (delegated; reads the chip's index).
  el("sysGrid").addEventListener("click", function(e){
    var chip = e.target.closest ? e.target.closest(".sys") : null;
    if (!chip) return;
    var chips = Array.prototype.slice.call(el("sysGrid").querySelectorAll(".sys"));
    var idx = chips.indexOf(chip);
    var tile = (idx >= 0 && lastTiles[idx]) ? lastTiles[idx] : null;
    var key = tile ? tileKey(tile.title) : "";
    if (key) openSheet(key);
  });
  // Back (accounts layer 2 → layer 1) re-opens the accounts list.
  el("sheetBack").addEventListener("click", function(){ if (currentKey) openSystem(currentKey); });
  el("sheetClose").addEventListener("click", closeSheet);
  el("sheetBackdrop").addEventListener("click", closeSheet);
  document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeSheet(); });

  // ── VOICE (mic) — tap to talk to Gamma via OpenAI Realtime ─
  // Read/answer only: GammaRealtime streams mic in, plays Gamma's audio out, and
  // fulfills the get_gamma_state tool from the live read-only endpoints. A second
  // tap ends the session and stops all tracks (usage-billed — teardown matters).
  (function wireMic(){
    var btn = el("micBtn");
    var statusEl = el("micStatus");
    var coreWrap = document.querySelector(".core-wrap");
    if (!btn || !window.GammaRealtime) {
      if (btn) { btn.disabled = true; btn.title = "Voice unavailable"; }
      return;
    }
    var MIC_CLASSES = ["is-connecting","is-listening","is-user","is-speaking","is-error"];
    function clearMic(){ MIC_CLASSES.forEach(function(c){ btn.classList.remove(c); }); }
    function setCoreVoice(state){
      if (!coreWrap) return;
      coreWrap.classList.remove("voice-listening","voice-speaking");
      if (state === "listening" || state === "user") coreWrap.classList.add("voice-listening");
      else if (state === "speaking") coreWrap.classList.add("voice-speaking");
    }
    function setStatus(text, kind){
      statusEl.textContent = text;
      statusEl.classList.toggle("is-live", kind === "live");
      statusEl.classList.toggle("is-error", kind === "error");
    }
    function onStatus(s){
      clearMic();
      window.__gammaVoice = (s === "listening" || s === "user_speaking" || s === "speaking");
      if (s === "connecting"){ btn.classList.add("is-connecting"); setStatus("Connecting…"); setCoreVoice(null); return; }
      if (s === "listening"){ btn.classList.add("is-listening"); setStatus("Listening — tap to end", "live"); setCoreVoice("listening"); return; }
      if (s === "user_speaking"){ btn.classList.add("is-user"); setStatus("Listening — tap to end", "live"); setCoreVoice("user"); return; }
      if (s === "speaking"){ btn.classList.add("is-speaking"); setStatus("Gamma is speaking…", "live"); setCoreVoice("speaking"); return; }
      if (s === "stopped"){ setStatus("Tap to talk"); setCoreVoice(null); return; }
      if (s && s.indexOf("error:") === 0){
        btn.classList.add("is-error");
        setStatus(s.slice(6) || "Voice error", "error");
        setCoreVoice(null);
        return;
      }
    }
    btn.addEventListener("click", function(){
      if (window.GammaRealtime.isActive()){
        window.GammaRealtime.stop();   // second tap → end session, stop all tracks
      } else {
        window.GammaRealtime.start(onStatus);
      }
    });
    // Tearing down on page hide stops the billed session if the tab is closed.
    window.addEventListener("pagehide", function(){
      try { if (window.GammaRealtime.isActive()) window.GammaRealtime.stop(true); } catch(_){}
    });
  })();

  // ── boot ──────────────────────────────────────────────────
  loadTiles();
  loadFeed();
  loadVitals();
  loadPulse();
  loadNeeds();
  connectSSE();
  // safety re-poll in case SSE is silent for a while
  setInterval(loadTiles, 30000);
  setInterval(loadFeed, 60000);
  setInterval(loadVitals, 30000);
  setInterval(loadPulse, 60000);
  setInterval(loadNeeds, 45000);
})();
</script>
<script>
// PWA service-worker registration — guarded; only on https or localhost.
(function(){
  "use strict";
  try {
    var host = location.hostname;
    var secure = (location.protocol === "https:") ||
                 host === "localhost" || host === "127.0.0.1" || host === "[::1]";
    if (secure && "serviceWorker" in navigator) {
      window.addEventListener("load", function(){
        navigator.serviceWorker.register("/service-worker.js").catch(function(){ /* non-fatal */ });
      });
    }
  } catch(_){ /* never block the app on SW failure */ }
})();
</script>

<!-- Pixel office — DESKTOP ONLY (phone stays plain Gamma); living agents fed by /api/agents-live -->
<script src="/pixels.js"></script>
<script>
(function(){
  "use strict";
  var canvas = document.getElementById("gx-office");
  if (!canvas || !window.GammaPixels) return;
  var DESKTOP = 1000;            // office needs the wide side margins; below this = plain Gamma
  var mounted = false, timer = null;
  function pump(){
    fetch("/api/agents-live", { cache: "no-store" })
      .then(function(r){ return r.json(); })
      .then(function(d){
        var list = (d && d.agents) || [];
        // When you're talking to Gamma, a Claude worker comes to life in the office.
        if (window.__gammaVoice) {
          list = list.concat([{ id:"voice-claude", role:"claude", runner:"Claude Opus", task:"talking with you", status:"working" }]);
        }
        try { window.GammaPixels.setAgents(list); } catch(_){}
      })
      .catch(function(){ /* fail-open: office keeps its last roster */ });
  }
  // Measure the ACTUAL Gamma card footprint (top → bottom of the last card) and hand
  // it to the office so it reserves exactly that area — no office renders behind the
  // card (the card is glass; anything behind it bleeds through and hides the vitals).
  function measureCard(){
    if (!mounted || !window.GammaPixels || !window.GammaPixels.setCardRect) return;
    try {
      var frame = document.querySelector(".frame"); if (!frame) return;
      var fr = frame.getBoundingClientRect();
      var bottom = fr.top;
      frame.querySelectorAll(".hero, .card").forEach(function(el){
        var r = el.getBoundingClientRect(); if (r.bottom > bottom) bottom = r.bottom;
      });
      window.GammaPixels.setCardRect({ x: fr.left, y: 0, w: fr.width, h: Math.min(bottom + 16, window.innerHeight) });
    } catch(_){}
  }
  function evalView(){
    var wide = window.innerWidth >= DESKTOP;
    if (wide && !mounted){
      try { window.GammaPixels.mount(canvas); } catch(_){ return; }
      canvas.style.display = ""; mounted = true;
      measureCard(); pump(); timer = setInterval(pump, 2500);
    } else if (!wide && mounted){
      try { if (window.GammaPixels.unmount) window.GammaPixels.unmount(); } catch(_){}
      if (timer){ clearInterval(timer); timer = null; }
      canvas.style.display = "none"; mounted = false;
    } else if (!wide){
      canvas.style.display = "none";   // phone: never show the office
    }
  }
  evalView();
  var rt = null;
  window.addEventListener("resize", function(){ clearTimeout(rt); rt = setTimeout(evalView, 250); });
})();
</script>
