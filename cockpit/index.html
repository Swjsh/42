<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamma Companion</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --green-bg: #0d2012;
    --green-border: #238636;
    --amber: #d29922;
    --amber-bg: #1f1a05;
    --amber-border: #9e6a03;
    --red: #f85149;
    --red-bg: #200d0d;
    --red-border: #6e1d1d;
    --accent: #58a6ff;
    --font-mono: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Health strip ── */
  .health-strip {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .strip-identity {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .strip-identity .name {
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    letter-spacing: 0.2px;
  }
  .strip-identity .version {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: livepulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .live-dot.dead { background: var(--red); animation: none; }
  @keyframes livepulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* dots row */
  .dots-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .dot-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    cursor: default;
  }
  .dot-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-chip .dot.GREEN { background: var(--green); }
  .dot-chip .dot.YELLOW { background: var(--amber); }
  .dot-chip .dot.RED {
    background: var(--red);
    animation: reddot 1.2s ease-in-out infinite;
  }
  @keyframes reddot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,0.5); }
    50% { box-shadow: 0 0 0 3px rgba(248,81,73,0); }
  }

  .strip-verdict {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .strip-verdict .verdict-text {
    color: var(--text);
    font-weight: 500;
  }
  #clock {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
  }

  /* ── Feed ── */
  .feed-container {
    flex: 1;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .feed-header {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 0 4px 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .bubble-wrapper {
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadein 0.25s ease-out;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }

  .bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
    word-break: break-word;
  }
  .bubble.shipped { border-left-color: var(--green); }
  .bubble.healthy { border-left-color: var(--green); background: var(--green-bg); }
  .bubble.caution { border-left-color: var(--red); background: var(--red-bg); }
  .bubble.info    { border-left-color: #58a6ff; }

  .bubble-meta {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-mono);
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bubble-kind-badge {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
  }
  .bubble-kind-badge.shipped { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .bubble-kind-badge.healthy { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .bubble-kind-badge.caution { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .bubble-kind-badge.info    { background: var(--bg3); color: var(--accent); border: 1px solid var(--border); }

  .feed-empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 40px 0;
    opacity: 0.6;
  }

  /* scroll bars */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Tooltip for dots ── */
  .dot-chip { position: relative; }
  .dot-chip:hover .dot-tooltip {
    display: block;
  }
  .dot-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text);
    white-space: nowrap;
    max-width: 260px;
    white-space: normal;
    z-index: 100;
    pointer-events: none;
  }

  /* ── Responsive / mobile ── */
  @media (max-width: 480px) {
    .health-strip {
      padding: 8px 12px;
      gap: 8px;
    }
    .strip-identity .name { font-size: 14px; }
    .dots-row { gap: 4px; }
    .dot-chip { font-size: 10px; }
    .strip-verdict { margin-left: 0; width: 100%; }
    .feed-container { padding: 12px 10px; }
    .bubble { font-size: 12px; padding: 9px 12px; }
  }
</style>
</head>
<body>

<!-- Health strip -->
<div class="health-strip" id="health-strip">
  <div class="strip-identity">
    <span class="name">Gamma</span>
    <span class="version">companion</span>
  </div>
  <div class="live-badge">
    <div class="live-dot dead" id="sse-dot"></div>
    <span id="sse-label">connecting</span>
  </div>
  <div class="dots-row" id="dots-row">
    <!-- populated by JS -->
  </div>
  <div class="strip-verdict">
    <span class="verdict-text" id="verdict-text">—</span>
    <span id="clock">—</span>
  </div>
</div>

<!-- Feed -->
<div class="feed-container">
  <div class="feed-header">Gamma · first person log</div>
  <div id="feed">
    <div class="feed-empty">Loading…</div>
  </div>
</div>

<script>
const PORT = location.port || 4500;
const BASE = `${location.protocol}//${location.hostname}:${PORT}`;

// ── Clock (ET) ──
function updateClock() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const p = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    `ET ${p(et.getMonth()+1)}/${p(et.getDate())} ${p(et.getHours())}:${p(et.getMinutes())}`;
}
setInterval(updateClock, 30000);
updateClock();

// ── SSE ──
let es = null;
function connectSSE() {
  if (es) es.close();
  es = new EventSource(`${BASE}/events`);
  es.onopen = () => setSse(true);
  es.onerror = () => { setSse(false); setTimeout(connectSSE, 3000); };
  es.onmessage = () => {
    // Any state-change event → refresh tiles + feed
    refreshTiles();
    refreshFeed();
  };
}
function setSse(ok) {
  const dot = document.getElementById('sse-dot');
  dot.className = ok ? 'live-dot' : 'live-dot dead';
  document.getElementById('sse-label').textContent = ok ? 'live' : 'reconnecting';
}

// ── Tiles / health dots ──
const DOT_LABELS = {
  'Engine': 'Engine',
  'Beacon (Eye)': 'Beacon',
  'Accounts / P&L': 'Accounts',
  'Conductor': 'Conductor',
  'Gym': 'Gym',
  'Kitchen': 'Kitchen',
  'Spend': 'Spend',
  'Discord Bridge': 'Discord',
  'Autonomy Loop': 'Loop',
  'Task Health': 'Tasks',
};

async function refreshTiles() {
  try {
    const res = await fetch(`${BASE}/api/tiles`);
    const tiles = await res.json();
    renderDots(tiles);
  } catch (_) {}
}

function renderDots(tiles) {
  const row = document.getElementById('dots-row');
  row.innerHTML = '';
  let reds = 0, ambers = 0;
  for (const t of tiles) {
    const label = DOT_LABELS[t.title] || t.title;
    const chip = document.createElement('div');
    chip.className = 'dot-chip';
    chip.title = t.text || '';
    chip.innerHTML = `
      <div class="dot ${t.light}"></div>
      <span>${escHtml(label)}</span>
      <div class="dot-tooltip">${escHtml(t.text || '')}</div>
    `;
    row.appendChild(chip);
    if (t.light === 'RED') reds++;
    else if (t.light === 'YELLOW') ambers++;
  }
  // Verdict sentence
  const vt = document.getElementById('verdict-text');
  if (reds > 0) vt.textContent = `${reds} need${reds === 1 ? 's' : ''} attention`;
  else if (ambers > 0) vt.textContent = `Healthy · ${ambers} caution`;
  else vt.textContent = 'All systems healthy';
}

// ── Feed ──
async function refreshFeed() {
  try {
    const res = await fetch(`${BASE}/api/feed`);
    const { messages } = await res.json();
    renderFeed(messages);
  } catch (_) {}
}

function renderFeed(messages) {
  const feed = document.getElementById('feed');
  if (!messages || messages.length === 0) {
    feed.innerHTML = '<div class="feed-empty">No messages yet — Gamma is warming up.</div>';
    return;
  }
  feed.innerHTML = '';
  for (const msg of messages) {
    const wrapper = document.createElement('div');
    wrapper.className = 'bubble-wrapper';
    const kindLabel = { shipped: 'shipped', caution: 'needs attention', healthy: 'healthy', info: 'info' }[msg.kind] || msg.kind;
    wrapper.innerHTML = `
      <div class="bubble-meta">
        <span>${escHtml(msg.ts_et || '')}</span>
        <span class="bubble-kind-badge ${escHtml(msg.kind)}">${escHtml(kindLabel)}</span>
      </div>
      <div class="bubble ${escHtml(msg.kind)}">${escHtml(msg.text || '')}</div>
    `;
    feed.appendChild(wrapper);
  }
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ──
connectSSE();
refreshTiles();
refreshFeed();
setInterval(refreshTiles, 10000);
setInterval(refreshFeed, 30000);
</script>
</body>
</html>
