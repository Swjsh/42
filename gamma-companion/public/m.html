<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0b1120" />
    <title>Gamma</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root { color-scheme: dark; --accent: #34e0a1; --accent-soft: rgba(52,224,161,0.14); --ink: #eef2f6; --muted: #93a0bb; --faint: #6b7791;
        --bg0: #0b1120; --glass: rgba(255,255,255,0.045); --brd: rgba(255,255,255,0.085); --warn: #f0b24a; --bad: #ff6b6b; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      [hidden] { display: none !important; }
      html, body { margin: 0; height: 100%; color: var(--ink); font-family: "Segoe UI", system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
        background: radial-gradient(125% 80% at 50% -8%, #16233f 0%, #0c1120 46%, #070a14 100%) fixed; }
      body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

      /* header */
      .top { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px 8px; flex: none; }
      .brand { font-size: 17px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
        background: linear-gradient(90deg, #7af0c2, #34e0a1); -webkit-background-clip: text; background-clip: text; color: transparent; }
      .bell { width: 40px; height: 40px; border-radius: 50%; display: grid; place-items: center; cursor: pointer;
        background: var(--glass); border: 1px solid var(--brd); color: var(--muted); }
      .bell.on { color: var(--accent); border-color: rgba(52,224,161,0.45); background: var(--accent-soft); }
      .bell svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

      /* scroll area */
      .scroll { flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 16px 8px; }
      .scroll::-webkit-scrollbar { width: 0; }

      /* robot hero */
      .robot { width: min(46vw, 178px); height: min(46vw, 178px); margin: 2px auto 0; }
      .robotsvg { width: 100%; height: 100%; overflow: visible; }
      .botbody { animation: float 4s ease-in-out infinite; transform-origin: 110px 120px; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      .antennatip { animation: blink 2.4s ease-in-out infinite; }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      .ring { opacity: 0; transform-origin: 110px 112px; }
      .robot.listening .ring { animation: ripple 1.8s ease-out infinite; }
      .robot.listening .r2 { animation-delay: 0.5s; }
      @keyframes ripple { 0% { opacity: 0.55; transform: scale(0.82); } 100% { opacity: 0; transform: scale(1.12); } }
      .robot.talking .eye { animation: eyebounce 0.5s ease-in-out infinite; }
      .robot.talking .chevron, .robot.talking .antennatip { animation: glowpulse 0.6s ease-in-out infinite; }
      @keyframes eyebounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.5px); } }
      @keyframes glowpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
      .status { text-align: center; font-size: 14.5px; color: var(--muted); min-height: 20px; margin: 4px 0 16px; transition: color .2s ease; }
      .robot.listening ~ .status, .robot.talking ~ .status { color: var(--accent); }

      /* now / next — one quiet line */
      .nownext { max-width: 520px; margin: 0 auto 16px; }
      .nncard { position: relative; background: var(--glass); border: 1px solid var(--brd); border-left: 3px solid var(--accent); border-radius: 14px; padding: 11px 14px; }
      .nncard.working { border-left-color: var(--warn); }
      .nncard.red { border-left-color: var(--bad); }
      .nnline { font-size: 13.5px; line-height: 1.5; color: var(--ink); padding-right: 20px; }
      .nnline + .nnline { margin-top: 2px; }
      .nnk { color: var(--faint); font-weight: 700; font-size: 10.5px; letter-spacing: 1px; text-transform: uppercase; margin-right: 8px; }
      .nndot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }
      .nnalert { color: var(--accent); font-weight: 600; }
      .nndismiss { position: absolute; top: 5px; right: 5px; width: 28px; height: 28px; line-height: 26px; text-align: center; padding: 0;
        border: none; background: transparent; color: var(--faint); font-size: 19px; border-radius: 9px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
      .nndismiss:hover, .nndismiss:active { color: var(--ink); background: var(--glass); }

      /* tasks */
      .tasks { max-width: 520px; margin: 0 auto; }
      .aphead { font-size: 11.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--faint); margin: 2px 4px 11px; }
      .card { background: var(--glass); border: 1px solid var(--brd); border-left: 3px solid var(--accent); border-radius: 13px; padding: 10px 13px; margin-bottom: 8px;
        overflow: hidden; max-height: 320px; transition: opacity .3s ease, transform .3s ease, max-height .34s ease, margin .3s ease, padding .3s ease, border-width .3s ease; }
      .card.warn { border-left-color: var(--warn); }
      .card.removing { opacity: 0; transform: translateX(46px) scale(.97); max-height: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0; border-width: 0; }
      /* Compact: key title on one line, one-liner detail, small buttons. */
      .card .title { font-size: 14px; font-weight: 650; line-height: 1.3; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card .detail { font-size: 11.5px; color: var(--muted); line-height: 1.4; margin-bottom: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .card .row { display: flex; gap: 9px; }
      .card .row button { flex: 1; height: 38px; border-radius: 10px; border: 1px solid var(--brd); font-size: 18px; font-weight: 700; cursor: pointer; display: grid; place-items: center; transition: transform .1s ease, background .15s ease; }
      .card .row button:active { transform: scale(0.95); }
      .ok { background: rgba(52,224,161,0.15); border-color: rgba(52,224,161,0.5) !important; color: var(--accent); }
      .no { background: rgba(255,107,107,0.1); border-color: rgba(255,107,107,0.4) !important; color: #ff8f8f; }
      .empty { text-align: center; color: var(--faint); font-size: 14.5px; padding: 18px; }
      .offline { text-align: center; color: #ff8f8f; font-size: 14px; padding: 14px; }

      /* chat log (above the bar) */
      .chatlog { max-width: 520px; margin: 14px auto 4px; display: flex; flex-direction: column; gap: 8px; }
      .chatlog:empty { display: none; }
      .amsg { font-size: 14.5px; line-height: 1.45; padding: 11px 14px; border-radius: 16px; max-width: 88%; word-break: break-word; white-space: pre-wrap; }
      .amsg.me { align-self: flex-end; background: var(--accent-soft); border-bottom-right-radius: 5px; }
      .amsg.gamma { align-self: flex-start; background: var(--glass); border: 1px solid var(--brd); border-bottom-left-radius: 5px; }
      .amsg.work { align-self: flex-start; background: transparent; border: 1px dashed var(--brd); color: var(--muted); font-size: 13px; font-style: italic; }
      .amsg.err { align-self: flex-start; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.3); color: #ff8f8f; }
      .amsg .who { display: block; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--faint); margin-bottom: 3px; }

      /* rendered markdown — GAMMA answer bubbles only (scannable, clean) */
      .amsg.gamma { padding: 12px 15px; max-width: 90%; border-radius: 16px 16px 16px 6px; }
      .amsg.gamma .md { line-height: 1.5; white-space: normal; }
      .amsg.gamma .md > :first-child { margin-top: 0; }
      .amsg.gamma .md > :last-child { margin-bottom: 0; }
      .amsg.gamma .md p { margin: 7px 0; }
      .amsg.gamma strong { color: #cdeede; font-weight: 700; }
      .amsg.gamma code { font-family: "SF Mono", "Cascadia Code", ui-monospace, "Consolas", monospace; font-size: 12.5px;
        background: rgba(52,224,161,0.12); border: 1px solid rgba(52,224,161,0.22); color: #aef0d4;
        padding: 1px 6px; border-radius: 6px; word-break: break-word; }
      .amsg.gamma ul { margin: 6px 0; padding-left: 18px; }
      .amsg.gamma li { margin: 2px 0; }
      .amsg.gamma .h { color: #cdeede; font-weight: 700; font-size: 13.5px; letter-spacing: 0.3px; margin: 11px 0 4px; }
      .amsg.gamma .md > .h:first-child { margin-top: 0; }

      /* bottom bar — the one combined chat + mic */
      .bar { flex: none; display: flex; align-items: center; gap: 9px; padding: 9px 14px calc(9px + env(safe-area-inset-bottom));
        background: rgba(8,11,20,0.72); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-top: 1px solid var(--brd); }
      .bar input { flex: 1; min-width: 0; height: 48px; border-radius: 999px; border: 1px solid var(--brd); background: var(--glass); color: var(--ink); font-size: 16px; padding: 0 18px; outline: none; }
      .bar input:focus { border-color: rgba(52,224,161,0.5); }
      .bar input::placeholder { color: var(--faint); }
      .circ { width: 48px; height: 48px; border-radius: 50%; border: none; flex: none; cursor: pointer; display: grid; place-items: center; transition: transform .1s ease; }
      .circ:active { transform: scale(0.93); }
      .circ svg { width: 23px; height: 23px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .micbtn { background: var(--glass); border: 1px solid var(--brd); color: var(--ink); }
      .micbtn.listening { background: rgba(255,107,107,0.2); color: #ff8f8f; animation: micpulse 1.3s infinite; }
      @keyframes micpulse { 0% { box-shadow: 0 0 0 0 rgba(255,107,107,0.45); } 100% { box-shadow: 0 0 0 13px rgba(255,107,107,0); } }
      .sendbtn { background: var(--accent); color: #04241a; }

      /* work-queue fly-out (the "leaf") */
      .hdr-actions { display: flex; align-items: center; gap: 8px; }
      .leafbtn { position: relative; }
      .qbadge { position: absolute; top: -3px; right: -3px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 9px;
        background: var(--accent); color: #04241a; font-size: 10px; font-weight: 800; display: grid; place-items: center; line-height: 1; }
      .qbackdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); opacity: 0; transition: opacity .28s ease; z-index: 39; }
      .qbackdrop.open { opacity: 1; }
      .qpanel { position: fixed; top: 0; right: 0; height: 100dvh; width: min(88vw, 372px); background: rgba(8,11,20,0.95);
        backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-left: 1px solid var(--brd);
        transform: translateX(100%); transition: transform .28s cubic-bezier(.22,.61,.36,1); z-index: 40; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
      .qpanel.open { transform: translateX(0); }
      .qhead { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 6px; }
      .qhead .aphead { margin: 0; }
      .qbody { flex: 1; min-height: 0; overflow-y: auto; padding: 6px 14px calc(18px + env(safe-area-inset-bottom)); }
      .qbody::-webkit-scrollbar { width: 0; }
      .qsec { margin-bottom: 15px; }
      .qsec .aphead { margin: 4px 2px 8px; }
      .qrow { background: var(--glass); border: 1px solid var(--brd); border-left: 3px solid var(--accent); border-radius: 12px;
        padding: 9px 12px; margin-bottom: 7px; display: flex; align-items: center; gap: 10px; }
      .qrow.working { border-left-color: var(--warn); }
      .qrow.failed { border-left-color: var(--bad); }
      .qmain { flex: 1; min-width: 0; }
      .qlabel { font-size: 13px; line-height: 1.35; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .qsub { font-size: 11px; color: var(--faint); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .qright { flex: none; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
      .qglyph.ok { color: var(--accent); } .qglyph.bad { color: var(--bad); } .qglyph.dim { color: var(--faint); }
      .qspin { width: 13px; height: 13px; border-radius: 50%; border: 2px solid rgba(240,178,74,0.25); border-top-color: var(--warn); animation: qspin .8s linear infinite; }
      @keyframes qspin { to { transform: rotate(360deg); } }
      .qempty { color: var(--faint); font-size: 12.5px; padding: 2px 2px 6px; }
    </style>
  </head>
  <body>
    <header class="top">
      <span class="brand">Gamma</span>
      <div class="hdr-actions">
        <button class="bell leafbtn" id="queueBtn" aria-label="Work queue" title="What Gamma's working on">
          <svg viewBox="0 0 24 24"><path d="M5 21c0-8.5 5.5-14 14-14 0 8.5-6 14-14 14z" /><path d="M5 21c3-5.5 7.5-9 13-10" /></svg>
          <span class="qbadge" id="qBadge" hidden>0</span>
        </button>
        <button class="bell" id="bell" hidden aria-label="Enable wrist alerts" title="Wrist alerts">
          <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9" /><path d="M13.7 21a2 2 0 01-3.4 0" /></svg>
        </button>
      </div>
    </header>

    <main class="scroll" id="scroll">
      <div class="robot" id="robot">
        <svg class="robotsvg" viewBox="0 0 220 220" aria-label="Gamma robot">
          <defs>
            <radialGradient id="glow" cx="50%" cy="46%" r="52%">
              <stop offset="0%" stop-color="#34e0a1" stop-opacity="0.55" />
              <stop offset="55%" stop-color="#34e0a1" stop-opacity="0.10" />
              <stop offset="100%" stop-color="#34e0a1" stop-opacity="0" />
            </radialGradient>
            <linearGradient id="rbody" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7af0c2" /><stop offset="100%" stop-color="#2fc488" /></linearGradient>
            <linearGradient id="rhead" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8ff5d2" /><stop offset="100%" stop-color="#41d29b" /></linearGradient>
          </defs>
          <circle class="glow" cx="110" cy="106" r="104" fill="url(#glow)" />
          <circle class="ring r2" cx="110" cy="112" r="96" fill="none" stroke="#34e0a1" stroke-width="1.5" />
          <circle class="ring r1" cx="110" cy="112" r="82" fill="none" stroke="#34e0a1" stroke-width="2" />
          <g class="botbody">
            <line x1="110" y1="50" x2="110" y2="34" stroke="#2fc488" stroke-width="4.5" stroke-linecap="round" />
            <circle class="antennatip" cx="110" cy="29" r="7.5" fill="#ffd86b" />
            <rect x="64" y="50" width="92" height="76" rx="27" fill="url(#rhead)" />
            <rect x="77" y="64" width="66" height="48" rx="19" fill="#08231c" />
            <circle class="eye" cx="99" cy="87" r="7.5" fill="#7af7d0" />
            <circle class="eye" cx="121" cy="87" r="7.5" fill="#7af7d0" />
            <path class="smile" d="M98 100 Q110 109 122 100" fill="none" stroke="#7af7d0" stroke-width="3.4" stroke-linecap="round" />
            <rect x="72" y="124" width="76" height="62" rx="23" fill="url(#rbody)" />
            <rect x="87" y="138" width="46" height="36" rx="13" fill="#08231c" />
            <path class="chevron" d="M96 158 L110 145 L124 158" fill="none" stroke="#5dffd0" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round" />
            <rect x="53" y="130" width="15" height="42" rx="7.5" fill="#34e0a1" />
            <rect x="152" y="120" width="15" height="36" rx="7.5" fill="#34e0a1" />
          </g>
        </svg>
      </div>
      <div class="status" id="status">Tap the mic to talk</div>

      <div class="nownext" id="nownext" hidden><div class="nncard" id="nncard"></div></div>

      <section class="tasks">
        <div class="aphead">Needs your OK</div>
        <div id="approvals"><div class="empty">Loading&hellip;</div></div>
      </section>

      <div class="chatlog" id="ask-log"></div>
    </main>

    <div class="bar">
      <button class="circ micbtn" id="mic" aria-label="Talk to Gamma">
        <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3" /><path d="M5 11a7 7 0 0014 0M12 18v3" /></svg>
      </button>
      <input id="ask-input" type="text" placeholder="Ask Gamma&hellip;" autocomplete="off" autocapitalize="sentences" enterkeyhint="send" />
      <button class="circ sendbtn" id="ask-send" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" /></svg>
      </button>
    </div>

    <div class="qbackdrop" id="qBackdrop" hidden></div>
    <aside class="qpanel" id="qPanel" hidden aria-label="Work queue">
      <div class="qhead">
        <span class="aphead">Work queue</span>
        <button class="bell" id="qClose" aria-label="Close">
          <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18" /></svg>
        </button>
      </div>
      <div class="qbody" id="qBody"></div>
    </aside>

    <script src="/realtime.js"></script>
    <script>
      (function () {
        var GTOK = (document.querySelector('meta[name="gamma-token"]') || {}).content || "";
        var _fetch = window.fetch.bind(window);
        window.fetch = function (url, opts) {
          if (typeof url === "string" && url.indexOf("/api/") === 0) {
            opts = opts || {};
            opts.headers = Object.assign({}, opts.headers || {}, { "x-gamma-token": GTOK });
          }
          return _fetch(url, opts);
        };
        var $ = function (id) { return document.getElementById(id); };
        var voiceAvailable = false;

        function setStatus(t) { var s = $("status"); if (s) s.textContent = t; }
        function robotState(state) {
          var r = $("robot"); if (!r) return;
          r.classList.remove("listening", "talking");
          if (state === "talking") r.classList.add("talking");
          else if (state === "listening" || state === "user_speaking") r.classList.add("listening");
          setStatus(
            state === "talking" ? "Gamma is talking…" :
            state === "user_speaking" ? "Listening…" :
            state === "listening" ? "Listening — go ahead" :
            "Tap the mic to talk"
          );
        }

        // ---- tasks: render + resolve (cards SLIDE AWAY on tap) ----
        var lastApprovalsSig = "__init__";
        var dismissed = {}; // ids the user already cleared this session — obligation/derived
                            // cards regenerate from live state, so we hide them locally so a
                            // tapped task STAYS gone instead of bouncing back on the next poll.
        var inflight = {};  // ask_id -> bubble. One working indicator per ask, EVER —
                            // stops a card-approval + a chat/voice ask stacking two
                            // "-ing" bubbles, and a re-poll/visibility-refresh re-minting one.
        function renderApprovals(list) {
          var box = $("approvals");
          if (!box) return;
          if (box.querySelector(".card[data-busy]")) return; // don't yank a card mid-animation
          var visible = (list || []).filter(function (a) { return a && a.id && !dismissed[a.id]; });
          // Only rebuild when the visible set actually changes -> no 5s flicker.
          var sig = visible.map(function (a) { return a.id + "|" + (a.title || ""); }).join("~");
          if (sig === lastApprovalsSig) return;
          lastApprovalsSig = sig;
          box.innerHTML = "";
          if (!visible.length) { box.innerHTML = '<div class="empty">Nothing needs you right now.</div>'; return; }
          visible.forEach(function (a) {
            var card = document.createElement("div");
            card.className = "card " + (a.severity === "warn" ? "warn" : "");
            var t = document.createElement("div"); t.className = "title"; t.textContent = a.title || "Decision";
            var row = document.createElement("div"); row.className = "row";
            var yes = document.createElement("button"); yes.className = "ok"; yes.textContent = "✓"; yes.setAttribute("aria-label", "Approve");
            var no = document.createElement("button"); no.className = "no"; no.textContent = "✗"; no.setAttribute("aria-label", "Reject");
            yes.onclick = function () { decide(a, "approve", card); };
            no.onclick = function () { decide(a, "reject", card); };
            row.append(yes, no);
            card.append(t);
            if (a.detail) { var d = document.createElement("div"); d.className = "detail"; d.textContent = a.detail; card.append(d); }
            card.append(row);
            box.appendChild(card);
          });
        }
        function vanish(card) {
          card.setAttribute("data-busy", "1");
          card.classList.add("removing");
          setTimeout(function () {
            var box = $("approvals");
            card.remove();
            if (box && !box.querySelector(".card")) box.innerHTML = '<div class="empty">Nothing needs you right now.</div>';
          }, 330);
        }
        function decide(a, decision, card) {
          card.style.pointerEvents = "none";
          if (a && a.id) dismissed[a.id] = 1; // keep it gone even if the server keeps regenerating it
          lastApprovalsSig = "__changed__"; // force the next poll to re-render the (now-filtered) set
          vanish(card); // optimistic: clear it immediately, the post is fire-and-confirm
          fetch("/api/approve", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ id: a.id, decision: decision, action: a.action || null }) })
            .then(function (r) { return r.json(); })
            .then(function (j) {
              // Card-approved builds go to the WORK QUEUE (the leaf panel + the now-line),
              // NOT a chat bubble — approving a card must never clutter the conversation,
              // and it must never stack a 2nd "-ing" bubble on top of a chat/voice ask.
              // The result lands in the queue's "Recently shipped" + a wrist push.
              if (j && j.escalated) { setStatus("Sent ⧉ — see the queue"); refreshNow(); } // non-committal: the queue shows accept/refuse
              setTimeout(refresh, 900);
            })
            .catch(function () {
              // The POST never reached the server -> the decision was NOT logged.
              // Un-dismiss so the card RE-SURFACES on the next poll (matching app.js),
              // instead of vanishing into dismissed{} for the rest of the session.
              if (a && a.id) delete dismissed[a.id];
              lastApprovalsSig = "__changed__";
              setStatus("That didn't send — it'll reappear if it wasn't logged");
              setTimeout(refresh, 1200);
            });
        }

        // ---- chat / build ----
        // SMALL, SAFE markdown renderer — GAMMA answer bubbles ONLY.
        // Escapes & < > " FIRST, then formats a safe subset on the ESCAPED string,
        // so no raw HTML from the model can ever survive (no XSS). Returns an HTML
        // string that is set via innerHTML only for class 'gamma'; user/work/err
        // bubbles stay plain textContent.
        function mdEsc(s) {

                if (!sub) return;
                // Re-sync the existing browser subscription to the server (saveSub is
                // idempotent) so a server reset / VAPID rotation self-heals — and the
                // bell only lights once the server actually HAS the record (no fake "on").
                return fetch("/api/push/subscribe", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ subscription: sub.toJSON() }) })
                  .then(function (r) { return r.json(); })
                  .then(function (j) { if (j && j.ok) bell.classList.add("on"); });
              }).catch(function () {});
            bell.hidden = false;
          }).catch(function () { bell.hidden = true; });
          bell.onclick = function () {
            if (Notification.permission === "denied") { setStatus("Notifications are blocked in your phone settings"); return; }
            Notification.requestPermission().then(function (perm) {
              if (perm !== "granted") { setStatus("Allow notifications to get wrist alerts"); return; }
              return navigator.serviceWorker.ready.then(function (reg) {
                return reg.pushManager.getSubscription().then(function (sub) {
                  return sub || reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: u8(vapidPublic) });
                });
              }).then(function (sub) {
                return fetch("/api/push/subscribe", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ subscription: sub.toJSON() }) }).then(function (r) { return r.json(); });
              }).then(function (j) {
                if (j && j.ok) { bell.classList.add("on"); setStatus("Wrist alerts on — I'll ping you"); }
                else setStatus("Couldn't turn on alerts — try again");
              });
            }).catch(function () { setStatus("Couldn't turn on alerts — try again"); });
          };
        }

        // service worker = required for push to the phone + watch
        if ("serviceWorker" in navigator) { navigator.serviceWorker.register("/service-worker.js").catch(function () {}); }

        initBell();
        refresh(); // self-schedules its next poll (5s healthy / 2s while reconnecting)
      })();
    </script>
  </body>
</html>
